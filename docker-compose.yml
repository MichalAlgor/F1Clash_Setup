services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: f1clash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d f1clash"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/f1clash
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
